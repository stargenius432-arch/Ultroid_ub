version: "1"
runtime:
  image: python:3.10
  env:
    - API_ID=${API_ID}
    - API_HASH=${API_HASH}
    - SESSION=${SESSION}
    - BOT_TOKEN=${BOT_TOKEN}
    - LOG_CHANNEL=${LOG_CHANNEL}
commands:
  build:
    - pip3 install --no-cache-dir -r requirements.txt
    - pip3 install --no-cache-dir python-dotenv aiohttp requests opencv-python akipy
  start: python3 -m pyUltroid
