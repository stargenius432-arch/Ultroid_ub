version: "1"
services:
  userbot:
    image: python:3.10
    build:
      command: pip3 install -r requirements.txt
    run:
      command: python3 -m pyUltroid
    env:
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - SESSION=${SESSION}
      - BOT_TOKEN=${BOT_TOKEN}
      - LOG_CHANNEL=${LOG_CHANNEL}
      
