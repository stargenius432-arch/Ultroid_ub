version: "1"
runtime:
  image: python:3.10-slim
  env:
    - API_ID=${API_ID}
    - API_HASH=${API_HASH}
    - SESSION=${SESSION}
    - BOT_TOKEN=${BOT_TOKEN}
    - LOG_CHANNEL=${LOG_CHANNEL}
commands:
  start: sh -c "mv requirements.txt req_backup.txt && pip3 install --no-cache-dir Telethon gitpython python-decouple python-dotenv telegraph enhancer requests aiohttp catbox-uploader cloudscraper opencv-python-headless akipy && python3 -m pyUltroid"
  
